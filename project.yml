name: WeekendRain
options:
  bundleIdPrefix: dev.weekendrain
  deploymentTarget:
    macOS: "13.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    MACOSX_DEPLOYMENT_TARGET: 13.0
    CODE_SIGNING_ALLOWED: NO
targets:
  WeekendRainCore:
    type: framework
    platform: macOS
    sources:
      - path: WeekendRain/Models
      - path: WeekendRain/Engine
      - path: WeekendRain/Views
      - path: WeekendRain/Backlog
      - path: WeekendRain/Gallery
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.weekendrain.core
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_TESTABILITY: YES
  WeekendRain:
    type: application
    platform: macOS
    sources:
      - path: WeekendRain/App
    dependencies:
      - target: WeekendRainCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.weekendrain.app
        INFOPLIST_FILE: WeekendRain/App/Info.plist
        ENABLE_HARDENED_RUNTIME: NO
  WeekendRainTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WeekendRainTests
    dependencies:
      - target: WeekendRainCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.weekendrain.tests
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_TESTABILITY: YES
schemes:
  WeekendRain:
    build:
      targets:
        WeekendRain: all
        WeekendRainTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WeekendRainTests

